services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcfd
      POSTGRES_PASSWORD: mcfd
      POSTGRES_DB: mcfd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcfd"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://mcfd:mcfd@db:5432/mcfd
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      # Optional — required only to run the CanLII scraper (app.scrapers.canlii)
      # Set in .env: CANLII_API_KEY=your_key_here
      CANLII_API_KEY: ${CANLII_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://backend:8000

volumes:
  pgdata:
